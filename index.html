<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSK1 中国語単語クイズ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f4f8;
    --card: #ffffff;
    --primary: #e53e3e;
    --primary-dark: #c53030;
    --accent: #2b6cb0;
    --correct: #38a169;
    --incorrect: #e53e3e;
    --text: #2d3748;
    --muted: #718096;
    --border: #e2e8f0;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
  }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    color: var(--text);
  }

  header {
    width: 100%;
    max-width: 520px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  h1 {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: 0.04em;
  }

  .mode-toggle {
    display: flex;
    background: var(--border);
    border-radius: 8px;
    padding: 3px;
    gap: 2px;
  }

  .mode-btn {
    padding: 5px 12px;
    border: none;
    border-radius: 6px;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    color: var(--muted);
  }

  .mode-btn.active {
    background: white;
    color: var(--accent);
    box-shadow: 0 1px 4px rgba(0,0,0,0.12);
  }

  .progress-bar-wrap {
    width: 100%;
    max-width: 520px;
    background: var(--border);
    border-radius: 99px;
    height: 6px;
    margin-bottom: 8px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), #fc8181);
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  .progress-label {
    width: 100%;
    max-width: 520px;
    display: flex;
    justify-content: space-between;
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .score-text { font-weight: 600; color: var(--correct); }

  .card {
    width: 100%;
    max-width: 520px;
    background: var(--card);
    border-radius: 20px;
    box-shadow: var(--shadow);
    padding: 32px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .category-tag {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-transform: uppercase;
    background: var(--bg);
    padding: 3px 10px;
    border-radius: 99px;
  }

  .chinese-word {
    font-size: 4rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.05em;
    line-height: 1.1;
    text-align: center;
    font-family: 'Noto Serif SC', 'SimSun', serif;
  }

  .audio-btn {
    background: var(--primary);
    border: none;
    border-radius: 50%;
    width: 52px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0 3px 10px rgba(229,62,62,0.3);
  }

  .audio-btn:hover { background: var(--primary-dark); transform: scale(1.05); }
  .audio-btn:active { transform: scale(0.96); }

  .audio-btn svg { width: 22px; height: 22px; fill: white; }

  .choices {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .choice-btn {
    width: 100%;
    padding: 14px 18px;
    border: 2px solid var(--border);
    border-radius: 12px;
    background: white;
    font-size: 1rem;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .choice-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: #ebf4ff;
  }

  .choice-btn:disabled { cursor: default; }

  .choice-btn.correct {
    border-color: var(--correct);
    background: #f0fff4;
    color: var(--correct);
    font-weight: 700;
  }

  .choice-btn.incorrect {
    border-color: var(--incorrect);
    background: #fff5f5;
    color: var(--incorrect);
  }

  .choice-num {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--muted);
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .choice-btn.correct .choice-num { background: var(--correct); color: white; }
  .choice-btn.incorrect .choice-num { background: var(--incorrect); color: white; }

  .result-panel {
    width: 100%;
    border-radius: 14px;
    padding: 18px 20px;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .result-panel.show { display: flex; }

  .result-panel.correct-panel {
    background: #f0fff4;
    border: 2px solid #68d391;
  }

  .result-panel.incorrect-panel {
    background: #fff5f5;
    border: 2px solid #fc8181;
  }

  .result-mark {
    font-size: 3rem;
    line-height: 1;
    font-weight: 700;
  }

  .result-mark.maru { color: var(--correct); }
  .result-mark.batsu { color: var(--incorrect); }

  .result-answer {
    font-size: 1rem;
    color: var(--text);
    text-align: center;
    line-height: 1.6;
  }

  .result-answer strong { color: var(--accent); font-size: 1.1rem; }

  .pinyin-display {
    font-size: 1rem;
    color: var(--accent);
    font-weight: 600;
    letter-spacing: 0.03em;
  }

  .katakana-display {
    font-size: 0.9rem;
    color: var(--muted);
    font-weight: 500;
  }

  .next-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), #4299e1);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    display: none;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }

  .next-btn.show { display: block; }
  .next-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .next-btn:active { transform: translateY(0); }

  .finish-screen {
    width: 100%;
    max-width: 520px;
    background: white;
    border-radius: 20px;
    box-shadow: var(--shadow);
    padding: 40px 28px;
    text-align: center;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .finish-screen.show { display: flex; }

  .finish-icon { font-size: 4rem; }

  .finish-title {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text);
  }

  .finish-score {
    font-size: 2.5rem;
    font-weight: 700;
    color: var(--accent);
  }

  .finish-subtitle { color: var(--muted); font-size: 0.9rem; }

  .restart-btn {
    margin-top: 8px;
    padding: 14px 32px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }

  .restart-btn:hover { background: var(--primary-dark); transform: scale(1.03); }
</style>
</head>
<body>

<header>
  <h1>🇨🇳 HSK1 単語クイズ</h1>
  <div class="mode-toggle">
    <button class="mode-btn active" id="btn-random" onclick="setMode('random')">ランダム</button>
    <button class="mode-btn" id="btn-order" onclick="setMode('order')">順番</button>
  </div>
</header>

<div class="progress-bar-wrap">
  <div class="progress-bar" id="progress-bar" style="width:0%"></div>
</div>
<div class="progress-label">
  <span id="progress-text">1 / 150</span>
  <span>正解: <span class="score-text" id="score-text">0</span></span>
</div>

<div class="card" id="quiz-card">
  <div class="category-tag" id="category-tag">数字</div>
  <div class="chinese-word" id="chinese-word">一</div>
  <button class="audio-btn" id="audio-btn" onclick="playAudio()" title="音声を再生">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
    </svg>
  </button>
  <div class="choices" id="choices"></div>
  <div class="result-panel" id="result-panel">
    <div class="result-mark" id="result-mark"></div>
    <div class="result-answer" id="result-answer"></div>
  </div>
  <button class="next-btn" id="next-btn" onclick="nextQuestion()">次の問題 →</button>
</div>

<div class="finish-screen" id="finish-screen">
  <div class="finish-icon" id="finish-icon">🎉</div>
  <div class="finish-title">クイズ完了！</div>
  <div class="finish-score" id="finish-score"></div>
  <div class="finish-subtitle" id="finish-subtitle"></div>
  <button class="restart-btn" onclick="restart()">もう一度チャレンジ</button>
</div>

let mode = 'random';
let queue = [];
let currentIndex = 0;
let currentWord = null;
let score = 0;
let answered = false;
let synth = window.speechSynthesis;
let voices = [];

synth.onvoiceschanged = () => { voices = synth.getVoices(); };
setTimeout(() => { voices = synth.getVoices(); }, 300);

function setMode(m) {
  mode = m;
  document.getElementById('btn-random').classList.toggle('active', m === 'random');
  document.getElementById('btn-order').classList.toggle('active', m === 'order');
  restart();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildQueue() {
  const indices = WORDS.map((_, i) => i);
  return mode === 'random' ? shuffle(indices) : indices;
}

function restart() {
  queue = buildQueue();
  currentIndex = 0;
  score = 0;
  answered = false;
  document.getElementById('finish-screen').classList.remove('show');
  document.getElementById('quiz-card').style.display = '';
  document.querySelector('.progress-bar-wrap').style.display = '';
  document.querySelector('.progress-label').style.display = '';
  updateScore();
  loadQuestion();
}

function loadQuestion() {
  if (currentIndex >= queue.length) {
    showFinish();
    return;
  }
  answered = false;
  currentWord = WORDS[queue[currentIndex]];

  document.getElementById('category-tag').textContent = currentWord.category;
  document.getElementById('chinese-word').textContent = currentWord.chinese;

  const resultPanel = document.getElementById('result-panel');
  resultPanel.className = 'result-panel';
  document.getElementById('next-btn').classList.remove('show');

  updateProgress();
  renderChoices();
  playAudio();
}

function renderChoices() {
  const container = document.getElementById('choices');
  container.innerHTML = '';

  const correct = currentWord.meaning;
  const pool = WORDS.filter(w => w.meaning !== correct);
  const shuffled = shuffle(pool);
  const wrongPool = [];
  const seen = new Set();
  for (const w of shuffled) {
    if (!seen.has(w.meaning)) {
      seen.add(w.meaning);
      wrongPool.push(w.meaning);
      if (wrongPool.length === 2) break;
    }
  }

  const options = shuffle([correct, ...wrongPool]);

  options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-num">${i + 1}</span><span>${opt}</span>`;
    btn.onclick = () => checkAnswer(opt, btn, correct);
    container.appendChild(btn);
  });
}

function checkAnswer(selected, btn, correct) {
  if (answered) return;
  answered = true;

  const allBtns = document.querySelectorAll('.choice-btn');
  allBtns.forEach(b => b.disabled = true);

  const isCorrect = selected === correct;
  const resultPanel = document.getElementById('result-panel');
  const resultMark = document.getElementById('result-mark');
  const resultAnswer = document.getElementById('result-answer');

  if (isCorrect) {
    score++;
    btn.classList.add('correct');
    resultMark.textContent = '○';
    resultMark.className = 'result-mark maru';
    resultPanel.className = 'result-panel correct-panel show';
    resultAnswer.innerHTML = `<strong>${currentWord.chinese}</strong> は「${correct}」<br>
      <span class="pinyin-display">${currentWord.pinyin}</span><br>
      <span class="katakana-display">（${currentWord.katakana}）</span>`;
  } else {
    btn.classList.add('incorrect');
    allBtns.forEach(b => {
      if (b.querySelector('span:last-child').textContent === correct) {
        b.classList.add('correct');
      }
    });
    resultMark.textContent = '×';
    resultMark.className = 'result-mark batsu';
    resultPanel.className = 'result-panel incorrect-panel show';
    resultAnswer.innerHTML = `正解は「<strong>${correct}</strong>」<br>
      <span class="pinyin-display">${currentWord.pinyin}</span><br>
      <span class="katakana-display">（${currentWord.katakana}）</span>`;
  }

  updateScore();
  document.getElementById('next-btn').classList.add('show');
}

function nextQuestion() {
  currentIndex++;
  loadQuestion();
}

function updateProgress() {
  const total = queue.length;
  const done = currentIndex;
  const pct = (done / total) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${done + 1} / ${total}`;
}

function updateScore() {
  document.getElementById('score-text').textContent = score;
}

function playAudio() {
  if (!currentWord) return;
  synth.cancel();
  const utter = new SpeechSynthesisUtterance(currentWord.chinese);
  utter.lang = 'zh-CN';
  utter.rate = 0.85;
  utter.pitch = 1;

  voices = synth.getVoices();
  const zhVoice = voices.find(v => v.lang.startsWith('zh'));
  if (zhVoice) utter.voice = zhVoice;

  synth.speak(utter);
}

function showFinish() {
  document.getElementById('quiz-card').style.display = 'none';
  document.querySelector('.progress-bar-wrap').style.display = 'none';
  document.querySelector('.progress-label').style.display = 'none';

  const total = queue.length;
  const pct = Math.round((score / total) * 100);
  let icon = '😊';
  if (pct >= 90) icon = '🏆';
  else if (pct >= 70) icon = '🎉';
  else if (pct >= 50) icon = '💪';
  else icon = '📚';

  document.getElementById('finish-icon').textContent = icon;
  document.getElementById('finish-score').textContent = `${score} / ${total}`;
  document.getElementById('finish-subtitle').textContent = `正解率 ${pct}%`;
  document.getElementById('finish-screen').classList.add('show');
}

restart();
</script>
