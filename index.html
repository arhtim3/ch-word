<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSK1 中国語単語クイズ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f4f8;
    --card: #ffffff;
    --primary: #e53e3e;
    --primary-dark: #c53030;
    --accent: #2b6cb0;
    --correct: #38a169;
    --incorrect: #e53e3e;
    --text: #2d3748;
    --muted: #718096;
    --border: #e2e8f0;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
  }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    color: var(--text);
  }

  header {
    width: 100%;
    max-width: 520px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  h1 {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: 0.04em;
  }

  .mode-toggle {
    display: flex;
    background: var(--border);
    border-radius: 8px;
    padding: 3px;
    gap: 2px;
  }

  .mode-btn {
    padding: 5px 12px;
    border: none;
    border-radius: 6px;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    color: var(--muted);
  }

  .mode-btn.active {
    background: white;
    color: var(--accent);
    box-shadow: 0 1px 4px rgba(0,0,0,0.12);
  }

  .progress-bar-wrap {
    width: 100%;
    max-width: 520px;
    background: var(--border);
    border-radius: 99px;
    height: 6px;
    margin-bottom: 8px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), #fc8181);
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  .progress-label {
    width: 100%;
    max-width: 520px;
    display: flex;
    justify-content: space-between;
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .score-text { font-weight: 600; color: var(--correct); }

  .card {
    width: 100%;
    max-width: 520px;
    background: var(--card);
    border-radius: 20px;
    box-shadow: var(--shadow);
    padding: 32px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .category-tag {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-transform: uppercase;
    background: var(--bg);
    padding: 3px 10px;
    border-radius: 99px;
  }

  .chinese-word {
    font-size: 4rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.05em;
    line-height: 1.1;
    text-align: center;
    font-family: 'Noto Serif SC', 'SimSun', serif;
  }

  .audio-btn {
    background: var(--primary);
    border: none;
    border-radius: 50%;
    width: 52px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0 3px 10px rgba(229,62,62,0.3);
  }

  .audio-btn:hover { background: var(--primary-dark); transform: scale(1.05); }
  .audio-btn:active { transform: scale(0.96); }

  .audio-btn svg { width: 22px; height: 22px; fill: white; }

  .choices {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .choice-btn {
    width: 100%;
    padding: 14px 18px;
    border: 2px solid var(--border);
    border-radius: 12px;
    background: white;
    font-size: 1rem;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .choice-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: #ebf4ff;
  }

  .choice-btn:disabled { cursor: default; }

  .choice-btn.correct {
    border-color: var(--correct);
    background: #f0fff4;
    color: var(--correct);
    font-weight: 700;
  }

  .choice-btn.incorrect {
    border-color: var(--incorrect);
    background: #fff5f5;
    color: var(--incorrect);
  }

  .choice-num {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--muted);
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .choice-btn.correct .choice-num { background: var(--correct); color: white; }
  .choice-btn.incorrect .choice-num { background: var(--incorrect); color: white; }

  .result-panel {
    width: 100%;
    border-radius: 14px;
    padding: 18px 20px;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .result-panel.show { display: flex; }

  .result-panel.correct-panel {
    background: #f0fff4;
    border: 2px solid #68d391;
  }

  .result-panel.incorrect-panel {
    background: #fff5f5;
    border: 2px solid #fc8181;
  }

  .result-mark {
    font-size: 3rem;
    line-height: 1;
    font-weight: 700;
  }

  .result-mark.maru { color: var(--correct); }
  .result-mark.batsu { color: var(--incorrect); }

  .result-answer {
    font-size: 1rem;
    color: var(--text);
    text-align: center;
    line-height: 1.6;
  }

  .result-answer strong { color: var(--accent); font-size: 1.1rem; }

  .pinyin-display {
    font-size: 1rem;
    color: var(--accent);
    font-weight: 600;
    letter-spacing: 0.03em;
  }

  .katakana-display {
    font-size: 0.9rem;
    color: var(--muted);
    font-weight: 500;
  }

  .example-sentence {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid rgba(0,0,0,0.08);
    width: 100%;
    text-align: left;
  }

  .example-zh {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
    font-family: 'Noto Serif SC', 'SimSun', serif;
    margin-bottom: 2px;
  }

  .example-pinyin {
    font-size: 0.82rem;
    color: var(--accent);
    margin-bottom: 2px;
  }

  .example-ja {
    font-size: 0.88rem;
    color: var(--muted);
  }

  .next-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), #4299e1);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    display: none;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }

  .next-btn.show { display: block; }
  .next-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .next-btn:active { transform: translateY(0); }

  .finish-screen {
    width: 100%;
    max-width: 520px;
    background: white;
    border-radius: 20px;
    box-shadow: var(--shadow);
    padding: 40px 28px;
    text-align: center;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .finish-screen.show { display: flex; }

  .finish-icon { font-size: 4rem; }

  .finish-title {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text);
  }

  .finish-score {
    font-size: 2.5rem;
    font-weight: 700;
    color: var(--accent);
  }

  .finish-subtitle { color: var(--muted); font-size: 0.9rem; }

  .restart-btn {
    margin-top: 8px;
    padding: 14px 32px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }

  .restart-btn:hover { background: var(--primary-dark); transform: scale(1.03); }
</style>
</head>
<body>

<header>
  <h1>🇨🇳 HSK1 単語クイズ</h1>
  <div class="mode-toggle">
    <button class="mode-btn active" id="btn-random" onclick="setMode('random')">ランダム</button>
    <button class="mode-btn" id="btn-order" onclick="setMode('order')">順番</button>
  </div>
</header>

<div class="progress-bar-wrap">
  <div class="progress-bar" id="progress-bar" style="width:0%"></div>
</div>
<div class="progress-label">
  <span id="progress-text">1 / 150</span>
  <span>正解: <span class="score-text" id="score-text">0</span></span>
</div>

<div class="card" id="quiz-card">
  <div class="category-tag" id="category-tag">数字</div>
  <div class="chinese-word" id="chinese-word">一</div>
  <button class="audio-btn" id="audio-btn" onclick="playAudio()" title="音声を再生">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
    </svg>
  </button>
  <div class="choices" id="choices"></div>
  <div class="result-panel" id="result-panel">
    <div class="result-mark" id="result-mark"></div>
    <div class="result-answer" id="result-answer"></div>
  </div>
  <button class="next-btn" id="next-btn" onclick="nextQuestion()">次の問題 →</button>
</div>

<div class="finish-screen" id="finish-screen">
  <div class="finish-icon" id="finish-icon">🎉</div>
  <div class="finish-title">クイズ完了！</div>
  <div class="finish-score" id="finish-score"></div>
  <div class="finish-subtitle" id="finish-subtitle"></div>
  <button class="restart-btn" onclick="restart()">もう一度チャレンジ</button>
</div>

<script>
const WORDS = [
  // 数字
  { chinese:'一', pinyin:'yī', katakana:'イー', meaning:'1', category:'数字', example:{ zh:'我有一个朋友。', pinyin:'Wǒ yǒu yī gè péngyou.', ja:'私には友達が一人います。' } },
  { chinese:'二', pinyin:'èr', katakana:'アル', meaning:'2', category:'数字', example:{ zh:'我有二十块钱。', pinyin:'Wǒ yǒu èrshí kuài qián.', ja:'私は20元持っています。' } },
  { chinese:'三', pinyin:'sān', katakana:'サン', meaning:'3', category:'数字', example:{ zh:'我家有三口人。', pinyin:'Wǒ jiā yǒu sān kǒu rén.', ja:'私の家には3人います。' } },
  { chinese:'四', pinyin:'sì', katakana:'スー', meaning:'4', category:'数字', example:{ zh:'今天是四月。', pinyin:'Jīntiān shì sì yuè.', ja:'今日は4月です。' } },
  { chinese:'五', pinyin:'wǔ', katakana:'ウー', meaning:'5', category:'数字', example:{ zh:'她五岁了。', pinyin:'Tā wǔ suì le.', ja:'彼女は5歳になりました。' } },
  { chinese:'六', pinyin:'liù', katakana:'リィウ', meaning:'6', category:'数字', example:{ zh:'我六点起床。', pinyin:'Wǒ liù diǎn qǐchuáng.', ja:'私は6時に起きます。' } },
  { chinese:'七', pinyin:'qī', katakana:'チー', meaning:'7', category:'数字', example:{ zh:'一周有七天。', pinyin:'Yī zhōu yǒu qī tiān.', ja:'一週間は7日あります。' } },
  { chinese:'八', pinyin:'bā', katakana:'バー', meaning:'8', category:'数字', example:{ zh:'他八岁了。', pinyin:'Tā bā suì le.', ja:'彼は8歳になりました。' } },
  { chinese:'九', pinyin:'jiǔ', katakana:'ジゥ', meaning:'9', category:'数字', example:{ zh:'现在九点了。', pinyin:'Xiànzài jiǔ diǎn le.', ja:'今9時になりました。' } },
  { chinese:'十', pinyin:'shí', katakana:'シー', meaning:'10', category:'数字', example:{ zh:'一共十个人。', pinyin:'Yīgòng shí gè rén.', ja:'合計10人います。' } },
  // 代詞
  { chinese:'我', pinyin:'wǒ', katakana:'ウォー', meaning:'私', category:'代詞', example:{ zh:'我是学生。', pinyin:'Wǒ shì xuésheng.', ja:'私は学生です。' } },
  { chinese:'你', pinyin:'nǐ', katakana:'ニー', meaning:'あなた', category:'代詞', example:{ zh:'你叫什么名字？', pinyin:'Nǐ jiào shénme míngzi?', ja:'あなたの名前は何ですか？' } },
  { chinese:'他', pinyin:'tā', katakana:'ター', meaning:'彼', category:'代詞', example:{ zh:'他是我的朋友。', pinyin:'Tā shì wǒ de péngyou.', ja:'彼は私の友達です。' } },
  { chinese:'她', pinyin:'tā', katakana:'ター', meaning:'彼女', category:'代詞', example:{ zh:'她很漂亮。', pinyin:'Tā hěn piàoliang.', ja:'彼女はとてもきれいです。' } },
  { chinese:'我们', pinyin:'wǒmen', katakana:'ウォーメン', meaning:'私たち', category:'代詞', example:{ zh:'我们一起去吧。', pinyin:'Wǒmen yīqǐ qù ba.', ja:'一緒に行きましょう。' } },
  { chinese:'他们', pinyin:'tāmen', katakana:'ターメン', meaning:'彼ら', category:'代詞', example:{ zh:'他们都是学生。', pinyin:'Tāmen dōu shì xuésheng.', ja:'彼らはみんな学生です。' } },
  { chinese:'这', pinyin:'zhè', katakana:'ジャー', meaning:'これ', category:'代詞', example:{ zh:'这是什么？', pinyin:'Zhè shì shénme?', ja:'これは何ですか？' } },
  { chinese:'那', pinyin:'nà', katakana:'ナー', meaning:'それ・あれ', category:'代詞', example:{ zh:'那是我的书。', pinyin:'Nà shì wǒ de shū.', ja:'あれは私の本です。' } },
  { chinese:'哪', pinyin:'nǎ', katakana:'ナー', meaning:'どれ', category:'代詞', example:{ zh:'哪个是你的？', pinyin:'Nǎ gè shì nǐ de?', ja:'どれがあなたのですか？' } },
  { chinese:'哪儿', pinyin:'nǎr', katakana:'ナール', meaning:'どこ', category:'代詞', example:{ zh:'你在哪儿？', pinyin:'Nǐ zài nǎr?', ja:'あなたはどこにいますか？' } },
  { chinese:'谁', pinyin:'shéi', katakana:'シェイ', meaning:'誰', category:'代詞', example:{ zh:'他是谁？', pinyin:'Tā shì shéi?', ja:'彼は誰ですか？' } },
  { chinese:'什么', pinyin:'shénme', katakana:'シェンマ', meaning:'何', category:'代詞', example:{ zh:'你吃什么？', pinyin:'Nǐ chī shénme?', ja:'あなたは何を食べますか？' } },
  { chinese:'怎么', pinyin:'zěnme', katakana:'ゼンマ', meaning:'どうやって', category:'代詞', example:{ zh:'怎么去？', pinyin:'Zěnme qù?', ja:'どうやって行きますか？' } },
  { chinese:'怎么样', pinyin:'zěnmeyàng', katakana:'ゼンマヤン', meaning:'どうですか', category:'代詞', example:{ zh:'你怎么样？', pinyin:'Nǐ zěnmeyàng?', ja:'お元気ですか？' } },
  { chinese:'几', pinyin:'jǐ', katakana:'ジー', meaning:'いくつ', category:'代詞', example:{ zh:'你几岁？', pinyin:'Nǐ jǐ suì?', ja:'何歳ですか？' } },
  { chinese:'多少', pinyin:'duōshao', katakana:'ドゥオシャオ', meaning:'どのくらい', category:'代詞', example:{ zh:'这个多少钱？', pinyin:'Zhège duōshao qián?', ja:'これはいくらですか？' } },
  // 量詞
  { chinese:'个', pinyin:'gè', katakana:'ガ', meaning:'（個数を数える助数詞）', category:'量詞', example:{ zh:'我有一个苹果。', pinyin:'Wǒ yǒu yī gè píngguǒ.', ja:'私はりんごが一つあります。' } },
  { chinese:'本', pinyin:'běn', katakana:'ベン', meaning:'（本を数える助数詞）', category:'量詞', example:{ zh:'我有三本书。', pinyin:'Wǒ yǒu sān běn shū.', ja:'私は本が3冊あります。' } },
  { chinese:'块', pinyin:'kuài', katakana:'クァイ', meaning:'（お金・塊を数える）', category:'量詞', example:{ zh:'这个五块钱。', pinyin:'Zhège wǔ kuài qián.', ja:'これは5元です。' } },
  { chinese:'些', pinyin:'xiē', katakana:'シエ', meaning:'いくつかの', category:'量詞', example:{ zh:'我想买些东西。', pinyin:'Wǒ xiǎng mǎi xiē dōngxi.', ja:'私はいくつかのものを買いたいです。' } },
  // 動詞
  { chinese:'是', pinyin:'shì', katakana:'シー', meaning:'～です', category:'動詞', example:{ zh:'我是日本人。', pinyin:'Wǒ shì Rìběnrén.', ja:'私は日本人です。' } },
  { chinese:'有', pinyin:'yǒu', katakana:'ヨウ', meaning:'持っている', category:'動詞', example:{ zh:'我有一个朋友。', pinyin:'Wǒ yǒu yī gè péngyou.', ja:'私には友達が一人います。' } },
  { chinese:'没有', pinyin:'méiyǒu', katakana:'メイヨウ', meaning:'持っていない', category:'動詞', example:{ zh:'我没有钱。', pinyin:'Wǒ méiyǒu qián.', ja:'私はお金を持っていません。' } },
  { chinese:'在', pinyin:'zài', katakana:'ザイ', meaning:'～にいる', category:'動詞', example:{ zh:'他在家。', pinyin:'Tā zài jiā.', ja:'彼は家にいます。' } },
  { chinese:'叫', pinyin:'jiào', katakana:'ジアオ', meaning:'～という名前', category:'動詞', example:{ zh:'我叫田中。', pinyin:'Wǒ jiào Tiánzhōng.', ja:'私は田中といいます。' } },
  { chinese:'认识', pinyin:'rènshi', katakana:'レンシ', meaning:'知り合う', category:'動詞', example:{ zh:'很高兴认识你。', pinyin:'Hěn gāoxìng rènshi nǐ.', ja:'あなたと知り合えてうれしいです。' } },
  { chinese:'喜欢', pinyin:'xǐhuan', katakana:'シーホワン', meaning:'好き', category:'動詞', example:{ zh:'我喜欢吃苹果。', pinyin:'Wǒ xǐhuan chī píngguǒ.', ja:'私はりんごを食べるのが好きです。' } },
  { chinese:'爱', pinyin:'ài', katakana:'アイ', meaning:'愛する', category:'動詞', example:{ zh:'我爱你。', pinyin:'Wǒ ài nǐ.', ja:'私はあなたを愛しています。' } },
  { chinese:'想', pinyin:'xiǎng', katakana:'シアン', meaning:'～したい', category:'動詞', example:{ zh:'我想去中国。', pinyin:'Wǒ xiǎng qù Zhōngguó.', ja:'私は中国へ行きたいです。' } },

  { chinese:'能', pinyin:'néng', katakana:'ノン', meaning:'できる（能力）', category:'動詞', example:{ zh:'你能帮我吗？', pinyin:'Nǐ néng bāng wǒ ma?', ja:'手伝ってもらえますか？' } },
  { chinese:'去', pinyin:'qù', katakana:'チュー', meaning:'行く', category:'動詞', example:{ zh:'我去学校。', pinyin:'Wǒ qù xuéxiào.', ja:'私は学校へ行きます。' } },
  { chinese:'来', pinyin:'lái', katakana:'ライ', meaning:'来る', category:'動詞', example:{ zh:'他来了。', pinyin:'Tā lái le.', ja:'彼が来ました。' } },
  { chinese:'回', pinyin:'huí', katakana:'ホイ', meaning:'帰る', category:'動詞', example:{ zh:'我回家了。', pinyin:'Wǒ huí jiā le.', ja:'私は家に帰りました。' } },
  { chinese:'开', pinyin:'kāi', katakana:'カイ', meaning:'開く・運転する', category:'動詞', example:{ zh:'他会开车。', pinyin:'Tā huì kāi chē.', ja:'彼は車を運転できます。' } },
  { chinese:'吃', pinyin:'chī', katakana:'チー', meaning:'食べる', category:'動詞', example:{ zh:'我吃米饭。', pinyin:'Wǒ chī mǐfàn.', ja:'私はご飯を食べます。' } },
  { chinese:'喝', pinyin:'hē', katakana:'ハー', meaning:'飲む', category:'動詞', example:{ zh:'我喝茶。', pinyin:'Wǒ hē chá.', ja:'私はお茶を飲みます。' } },
  { chinese:'看', pinyin:'kàn', katakana:'カン', meaning:'見る', category:'動詞', example:{ zh:'我看电视。', pinyin:'Wǒ kàn diànshì.', ja:'私はテレビを見ます。' } },

  { chinese:'不', pinyin:'bù', katakana:'ブー', meaning:'～ではない', category:'副詞', example:{ zh:'我不喜欢。', pinyin:'Wǒ bù xǐhuan.', ja:'私は好きではありません。' } },
  { chinese:'一点儿', pinyin:'yìdiǎnr', katakana:'イーディアル', meaning:'少し', category:'副詞', example:{ zh:'我会说一点儿汉语。', pinyin:'Wǒ huì shuō yìdiǎnr Hànyǔ.', ja:'私は少し中国語が話せます。' } },
  // 助詞
  { chinese:'的', pinyin:'de', katakana:'ド', meaning:'～の', category:'助詞', example:{ zh:'这是我的书。', pinyin:'Zhè shì wǒ de shū.', ja:'これは私の本です。' } },
  { chinese:'了', pinyin:'le', katakana:'ラ', meaning:'（完了・変化）', category:'助詞', example:{ zh:'他来了。', pinyin:'Tā lái le.', ja:'彼が来ました。' } },
  { chinese:'吗', pinyin:'ma', katakana:'マ', meaning:'～か？（疑問）', category:'助詞', example:{ zh:'你是学生吗？', pinyin:'Nǐ shì xuésheng ma?', ja:'あなたは学生ですか？' } },
  { chinese:'呢', pinyin:'ne', katakana:'ナ', meaning:'～は？（疑問）', category:'助詞', example:{ zh:'你呢？', pinyin:'Nǐ ne?', ja:'あなたは？' } },
  // 接続詞
  { chinese:'和', pinyin:'hé', katakana:'ハー', meaning:'～と', category:'接続詞', example:{ zh:'我和你一起去。', pinyin:'Wǒ hé nǐ yīqǐ qù.', ja:'私とあなたで一緒に行きます。' } },
  // 挨拶
  { chinese:'谢谢', pinyin:'xièxie', katakana:'シエシエ', meaning:'ありがとう', category:'挨拶', example:{ zh:'谢谢你的帮助。', pinyin:'Xièxie nǐ de bāngzhù.', ja:'助けてくれてありがとう。' } },
  { chinese:'不客气', pinyin:'bú kèqi', katakana:'ブー クァチ', meaning:'どういたしまして', category:'挨拶', example:{ zh:'不客气，这是我应该做的。', pinyin:'Bú kèqi, zhè shì wǒ yīnggāi zuò de.', ja:'どういたしまして、当然のことです。' } },
  { chinese:'对不起', pinyin:'duìbuqǐ', katakana:'ドゥイブチー', meaning:'すみません', category:'挨拶', example:{ zh:'对不起，我来晚了。', pinyin:'Duìbuqǐ, wǒ lái wǎn le.', ja:'すみません、遅れてしまいました。' } },
  { chinese:'没关系', pinyin:'méi guānxi', katakana:'メイ グァンシ', meaning:'大丈夫です', category:'挨拶', example:{ zh:'没关系，没事的。', pinyin:'Méi guānxi, méi shì de.', ja:'大丈夫です、問題ありません。' } },
  { chinese:'再见', pinyin:'zàijiàn', katakana:'ザイジエン', meaning:'さようなら', category:'挨拶', example:{ zh:'再见，明天见！', pinyin:'Zàijiàn, míngtiān jiàn!', ja:'さようなら、また明日！' } },
  { chinese:'喂', pinyin:'wèi', katakana:'ウェイ', meaning:'もしもし', category:'挨拶', example:{ zh:'喂，你好！', pinyin:'Wèi, nǐ hǎo!', ja:'もしもし、こんにちは！' } },
  { chinese:'请', pinyin:'qǐng', katakana:'チン', meaning:'どうぞ', category:'挨拶', example:{ zh:'请进！', pinyin:'Qǐng jìn!', ja:'どうぞお入りください！' } },
];

let mode = 'random';
let queue = [];
let currentIndex = 0;
let currentWord = null;
let score = 0;
let answered = false;
let synth = window.speechSynthesis;
let currentAudio = null;

function loadVoices() {
  return new Promise(resolve => {
    const v = synth.getVoices();
    if (v.length) { resolve(v); return; }
    const handler = () => {
      synth.removeEventListener('voiceschanged', handler);
      resolve(synth.getVoices());
    };
    synth.addEventListener('voiceschanged', handler);
    setTimeout(() => resolve(synth.getVoices()), 2000);
  });
}

function setMode(m) {
  mode = m;
  document.getElementById('btn-random').classList.toggle('active', m === 'random');
  document.getElementById('btn-order').classList.toggle('active', m === 'order');
  restart();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildQueue() {
  const indices = WORDS.map((_, i) => i);
  return mode === 'random' ? shuffle(indices) : indices;
}

function restart() {
  queue = buildQueue();
  currentIndex = 0;
  score = 0;
  answered = false;
  document.getElementById('finish-screen').classList.remove('show');
  document.getElementById('quiz-card').style.display = '';
  document.querySelector('.progress-bar-wrap').style.display = '';
  document.querySelector('.progress-label').style.display = '';
  updateScore();
  loadQuestion();
}

function loadQuestion() {
  if (currentIndex >= queue.length) {
    showFinish();
    return;
  }
  answered = false;
  currentWord = WORDS[queue[currentIndex]];

  document.getElementById('category-tag').textContent = currentWord.category;
  document.getElementById('chinese-word').textContent = currentWord.chinese;

  const resultPanel = document.getElementById('result-panel');
  resultPanel.className = 'result-panel';
  document.getElementById('next-btn').classList.remove('show');

  updateProgress();
  renderChoices();
  playAudio();
}

function renderChoices() {
  const container = document.getElementById('choices');
  container.innerHTML = '';

  const correct = currentWord.meaning;
  const pool = WORDS.filter(w => w.meaning !== correct);
  const shuffled = shuffle(pool);
  const wrongPool = [];
  const seen = new Set();
  for (const w of shuffled) {
    if (!seen.has(w.meaning)) {
      seen.add(w.meaning);
      wrongPool.push(w.meaning);
      if (wrongPool.length === 2) break;
    }
  }

  const options = shuffle([correct, ...wrongPool]);

  options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-num">${i + 1}</span><span>${opt}</span>`;
    btn.onclick = () => checkAnswer(opt, btn, correct);
    container.appendChild(btn);
  });
}

function checkAnswer(selected, btn, correct) {
  if (answered) return;
  answered = true;

  const allBtns = document.querySelectorAll('.choice-btn');
  allBtns.forEach(b => b.disabled = true);

  const isCorrect = selected === correct;
  const resultPanel = document.getElementById('result-panel');
  const resultMark = document.getElementById('result-mark');
  const resultAnswer = document.getElementById('result-answer');

  const ex = currentWord.example;
  const exampleHTML = ex ? `<div class="example-sentence">
      <div class="example-zh">${ex.zh}</div>
      <div class="example-pinyin">${ex.pinyin}</div>
      <div class="example-ja">${ex.ja}</div>
    </div>` : '';

  if (isCorrect) {
    score++;
    btn.classList.add('correct');
    resultMark.textContent = '○';
    resultMark.className = 'result-mark maru';
    resultPanel.className = 'result-panel correct-panel show';
    resultAnswer.innerHTML = `<strong>${currentWord.chinese}</strong> は「${correct}」<br>
      <span class="pinyin-display">${currentWord.pinyin}</span><br>
      <span class="katakana-display">（${currentWord.katakana}）</span>${exampleHTML}`;
  } else {
    btn.classList.add('incorrect');
    allBtns.forEach(b => {
      if (b.querySelector('span:last-child').textContent === correct) {
        b.classList.add('correct');
      }
    });
    resultMark.textContent = '×';
    resultMark.className = 'result-mark batsu';
    resultPanel.className = 'result-panel incorrect-panel show';
    resultAnswer.innerHTML = `正解は「<strong>${correct}</strong>」<br>
      <span class="pinyin-display">${currentWord.pinyin}</span><br>
      <span class="katakana-display">（${currentWord.katakana}）</span>${exampleHTML}`;
  }

  updateScore();
  document.getElementById('next-btn').classList.add('show');
}

function nextQuestion() {
  currentIndex++;
  loadQuestion();
}

function updateProgress() {
  const total = queue.length;
  const done = currentIndex;
  const pct = (done / total) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${done + 1} / ${total}`;
}

function updateScore() {
  document.getElementById('score-text').textContent = score;
}

async function playAudio() {
  if (!currentWord) return;
  synth.cancel();
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }

  const voices = await loadVoices();
  const zhVoice = voices.find(v => v.lang.startsWith('zh'));

  if (zhVoice) {
    // ブラウザ内蔵の中国語ボイスで読み上げ
    const utter = new SpeechSynthesisUtterance(currentWord.chinese);
    utter.voice = zhVoice;
    utter.lang = 'zh-CN';
    utter.rate = 0.85;
    utter.pitch = 1;
    synth.speak(utter);
  } else {
    // Google Translate TTS（AI音声）にフォールバック
    playGoogleTTS(voices);
  }
}

function playGoogleTTS(voices) {
  const word = currentWord;
  const url = 'https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=zh-CN&ttsspeed=0.8&q='
    + encodeURIComponent(word.chinese);

  currentAudio = new Audio(url);
  currentAudio.play().catch(() => {
    // Google TTSも失敗した場合 → カタカナを日本語ボイスで読む
    const utter = new SpeechSynthesisUtterance(word.katakana);
    const jaVoice = voices ? voices.find(v => v.lang.startsWith('ja')) : null;
    if (jaVoice) utter.voice = jaVoice;
    utter.lang = 'ja-JP';
    utter.rate = 0.85;
    synth.speak(utter);
  });
}

function showFinish() {
  document.getElementById('quiz-card').style.display = 'none';
  document.querySelector('.progress-bar-wrap').style.display = 'none';
  document.querySelector('.progress-label').style.display = 'none';

  const total = queue.length;
  const pct = Math.round((score / total) * 100);
  let icon = '😊';
  if (pct >= 90) icon = '🏆';
  else if (pct >= 70) icon = '🎉';
  else if (pct >= 50) icon = '💪';
  else icon = '📚';

  document.getElementById('finish-icon').textContent = icon;
  document.getElementById('finish-score').textContent = `${score} / ${total}`;
  document.getElementById('finish-subtitle').textContent = `正解率 ${pct}%`;
  document.getElementById('finish-screen').classList.add('show');
}

restart();
</script>
